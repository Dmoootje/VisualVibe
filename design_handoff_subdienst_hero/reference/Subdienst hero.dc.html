<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  a{text-decoration:none;color:inherit;}
  a:hover{color:#FF7A00;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,122,0,.6);}70%{box-shadow:0 0 0 7px rgba(255,122,0,0);}}
  .liveDot{animation:livePulse 2.2s ease-out infinite;}
  .ring1{transform-box:fill-box;transform-origin:center;animation:spin 32s linear infinite;}
  .ring2{transform-box:fill-box;transform-origin:center;animation:spin 44s linear infinite reverse;}
  .conic{animation:spin 16s linear infinite;}
  .hicon{transform-box:fill-box;transform-origin:center;animation:breathe 6s ease-in-out infinite,hglow 4.2s ease-in-out infinite;}
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.045);}}
  @keyframes hglow{0%,100%{filter:drop-shadow(0 0 5px rgba(255,122,0,.45));}50%{filter:drop-shadow(0 0 22px rgba(255,122,0,.85));}}
  .vv-mq{overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);mask-image:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);}
  .vv-mq-track{display:flex;gap:14px;width:max-content;will-change:transform;}
  .vv-mq-l{animation:mqL 40s linear infinite;}
  .vv-mq-r{animation:mqR 40s linear infinite;}
  .vv-mq:hover .vv-mq-track{animation-play-state:paused;}
  @keyframes mqL{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  @keyframes mqR{from{transform:translateX(-50%);}to{transform:translateX(0);}}
  .mqPill{transition:border-color .25s ease,background .25s ease,transform .25s ease;}
  .mqPill:hover{border-color:rgba(255,122,0,.45) !important;background:rgba(255,122,0,.06) !important;transform:translateY(-2px);}
  .heroBtn{transition:transform .25s ease,box-shadow .25s ease;white-space:nowrap;}
  .heroBtn:hover{transform:translateY(-2px);}
  .heroBtn .ar{transition:transform .3s ease;}.heroBtn:hover .ar{transform:translateX(5px);}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;}}
</style>
</helmet>

<!-- shared icon defs -->
<svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden;"><defs>
  <g id="svc-website" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="15" rx="2"></rect><path d="M3 9h18"></path><path d="M6 6.75h.01M8.5 6.75h.01"></path><path d="M7 13h5M7 16h9"></path></g>
  <g id="svc-webshop" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="9.5" cy="20" r="1.1"></circle><circle cx="18" cy="20" r="1.1"></circle><path d="M2.5 3.5H5l2.3 11.2a1.4 1.4 0 0 0 1.4 1.1h8.6a1.4 1.4 0 0 0 1.4-1.1L21.5 7.5H6"></path></g>
  <g id="svc-onepager" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="5.5" y="2.5" width="13" height="19" rx="2"></rect><path d="M8.5 7h7M8.5 11h7M8.5 15h4.5"></path></g>
  <g id="svc-vernieuwen" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20.5 8A8.5 8.5 0 0 0 6 5L3.5 7.2"></path><path d="M3.5 3v4.2h4.2"></path><path d="M3.5 16A8.5 8.5 0 0 0 18 19l2.5-2.2"></path><path d="M20.5 21v-4.2h-4.2"></path></g>
  <g id="svc-onderhoud" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4.2 4.2 0 0 0-5.4 5.4L3.2 17.8l3 3 6.1-6.1a4.2 4.2 0 0 0 5.4-5.4l-2.6 2.6-2.6-.7-.7-2.6z"></path></g>
  <g id="svc-wordpress" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 20H21"></path><path d="M16.6 3.4a2 2 0 0 1 2.9 2.9L7 18.8l-4 1 1-4z"></path><path d="M4 4.5h5M4 8h3.5"></path></g>
  <g id="svc-seo" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path><path d="M8.6 12.5v-1.5M11 12.5V9M13.4 12.5V8"></path></g>
</defs></svg>

<div style="position:relative;width:1440px;min-height:100%;overflow:hidden;background:#0a0a0a;color:#fff;font-family:'Manrope',sans-serif;">

  <!-- ===== HERO (scope of this handoff) ===== -->
  <section style="position:relative;overflow:hidden;padding:66px 56px 48px;">
    <div style="position:absolute;top:-160px;right:-120px;width:760px;height:760px;background:radial-gradient(circle at center,rgba(255,90,0,.16),transparent 64%);pointer-events:none;z-index:0;"></div>
    <div style="position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);background-size:54px 54px;-webkit-mask-image:radial-gradient(ellipse at 72% 34%,#000,transparent 70%);mask-image:radial-gradient(ellipse at 72% 34%,#000,transparent 70%);"></div>

    <div style="position:relative;z-index:2;max-width:1300px;margin:0 auto;display:grid;grid-template-columns:1.1fr .9fr;gap:44px;align-items:center;">
      <!-- left -->
      <div>
        <a href="#" style="display:flex;width:fit-content;align-items:center;gap:8px;font-family:'JetBrains Mono';font-size:12.5px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.03em;margin-bottom:20px;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg>
          Onderdeel van {{ pillar }}
        </a>
        <div style="display:inline-flex;align-items:center;gap:9px;padding:8px 15px;border-radius:9999px;background:rgba(255,122,0,.1);border:1px solid rgba(255,122,0,.25);font-family:'JetBrains Mono';font-weight:700;font-size:12px;letter-spacing:.08em;color:#FF9A45;margin-bottom:22px;text-transform:uppercase;white-space:nowrap;">
          <span class="liveDot" style="width:7px;height:7px;border-radius:9999px;background:#FF7A00;"></span>{{ hero.tag }}
        </div>
        <h1 style="font-family:'Sora';font-weight:800;font-size:60px;line-height:1.02;letter-spacing:-.03em;color:#fff;margin:0 0 22px;text-wrap:balance;">{{ hero.name }}</h1>
        <p style="font-size:18.5px;line-height:1.6;color:rgba(255,255,255,.64);margin:0 0 34px;max-width:500px;text-wrap:pretty;">{{ hero.desc }}</p>
        <div style="display:flex;flex-wrap:wrap;gap:14px;">
          <a href="#" class="heroBtn" style="display:inline-flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:#fff;padding:15px 28px;border-radius:12px;background:linear-gradient(90deg,#FF3B2E,#FF7A00);box-shadow:0 16px 40px -14px rgba(255,90,0,.85);">Offerte aanvragen <svg class="ar" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg></a>
          <a href="#" class="heroBtn" style="display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:16px;color:#fff;padding:15px 28px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);">Bekijk realisaties</a>
        </div>
      </div>

      <!-- right: big animated icon with revolving rings -->
      <div style="position:relative;display:flex;justify-content:center;align-items:center;min-height:440px;">
        <div class="conic" style="position:absolute;width:500px;height:500px;border-radius:9999px;background:conic-gradient(from 0deg,transparent 0deg,rgba(255,122,0,.30) 80deg,transparent 180deg,rgba(255,90,0,.20) 280deg,transparent 360deg);filter:blur(46px);pointer-events:none;"></div>
        <svg viewBox="0 0 200 200" style="position:relative;width:min(440px,88%);height:auto;">
          <defs>
            <radialGradient id="vvHeroGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="rgba(255,122,0,.30)"></stop>
              <stop offset="55%" stop-color="rgba(255,122,0,.07)"></stop>
              <stop offset="100%" stop-color="rgba(255,122,0,0)"></stop>
            </radialGradient>
          </defs>
          <circle cx="100" cy="100" r="99" fill="url(#vvHeroGlow)"></circle>
          <circle class="ring1" cx="100" cy="100" r="94" fill="none" stroke="rgba(255,122,0,.32)" stroke-width="1" stroke-dasharray="2 9" stroke-linecap="round"></circle>
          <circle class="ring2" cx="100" cy="100" r="79" fill="none" stroke="rgba(255,122,0,.20)" stroke-width="1" stroke-dasharray="1 11" stroke-linecap="round"></circle>
          <circle cx="100" cy="100" r="66" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.08)" stroke-width="1"></circle>
          <g class="hicon" style="color:#FF7A00;">
            <use href="#svc-{{ hero.id }}" transform="translate(52 52) scale(4)" stroke-width="1.5"></use>
          </g>
        </svg>
      </div>
    </div>

    <!-- ===== marquee: andere diensten binnen de pillar ===== -->
    <div style="position:relative;z-index:2;max-width:1300px;margin:44px auto 0;padding-top:30px;border-top:1px solid rgba(255,255,255,.08);">
      <p style="font-family:'JetBrains Mono';font-size:11.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.42);margin:0 0 18px;">Andere diensten binnen {{ pillar }}</p>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="vv-mq">
          <div class="vv-mq-track vv-mq-l">
            <sc-for list="{{ rowTop }}" as="s" hint-placeholder-count="12">
              <a href="#" class="mqPill" style="flex:none;display:inline-flex;align-items:center;gap:13px;padding:13px 24px 13px 15px;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.02);">
                <span style="flex:none;width:36px;height:36px;border-radius:10px;background:rgba(255,122,0,.1);border:1px solid rgba(255,122,0,.2);display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 24 24" width="19" height="19" style="color:#FF9A45;" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><use href="#svc-{{ s.id }}"></use></svg></span>
                <span style="font-size:15.5px;font-weight:600;color:rgba(255,255,255,.85);white-space:nowrap;">{{ s.name }}</span>
              </a>
            </sc-for>
          </div>
        </div>
        <div class="vv-mq">
          <div class="vv-mq-track vv-mq-r">
            <sc-for list="{{ rowBottom }}" as="s" hint-placeholder-count="12">
              <a href="#" class="mqPill" style="flex:none;display:inline-flex;align-items:center;gap:13px;padding:13px 24px 13px 15px;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.02);">
                <span style="flex:none;width:36px;height:36px;border-radius:10px;background:rgba(255,122,0,.1);border:1px solid rgba(255,122,0,.2);display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 24 24" width="19" height="19" style="color:#FF9A45;" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><use href="#svc-{{ s.id }}"></use></svg></span>
                <span style="font-size:15.5px;font-weight:600;color:rgba(255,255,255,.85);white-space:nowrap;">{{ s.name }}</span>
              </a>
            </sc-for>
          </div>
        </div>
      </div>
    </div>
  </section>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 880 }, &quot;dienst&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Website laten maken&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;Website laten maken&quot;, &quot;Webshop laten maken&quot;, &quot;Onepager laten maken&quot;, &quot;Website vernieuwen&quot;, &quot;Website-onderhoud&quot;, &quot;WordPress website laten maken&quot;, &quot;SEO-website laten maken&quot;], &quot;section&quot;: &quot;Inhoud&quot; } }">
class Component extends DCLogic {
  PILLAR = 'Webdesign';
  SERVICES = [
    { id:'website', name:'Website laten maken', tag:'Websites op maat',
      desc:'Of je nu start met je eerste website of een verouderde site vervangt: we bouwen een snelle, duidelijke website die bezoekers omzet in klanten.' },
    { id:'webshop', name:'Webshop laten maken', tag:'Verkopen online',
      desc:'Een webshop die makkelijk te beheren is en klaar is om te verkopen — met een soepel bestelproces en veilige betaalintegraties.' },
    { id:'onepager', name:'Onepager laten maken', tag:'Snel online',
      desc:'Een strakke onepager voor wie snel online wil staan met een beperkt budget, zonder in te boeten op uitstraling.' },
    { id:'vernieuwen', name:'Website vernieuwen', tag:'Redesign & migratie',
      desc:'Een verouderde website omgezet naar een snelle, actuele versie — met behoud van je posities in Google.' },
    { id:'onderhoud', name:'Website-onderhoud', tag:'Zorgeloos online',
      desc:'Doorlopend onderhoud zodat je website veilig, snel en up-to-date blijft — zonder dat jij ernaar om hoeft te kijken.' },
    { id:'wordpress', name:'WordPress website laten maken', tag:'Zelf beheerbaar',
      desc:'Een WordPress-website die je zelf makkelijk kan bijwerken, met een flexibel CMS dat met je meegroeit.' },
    { id:'seo', name:'SEO-website laten maken', tag:'Gebouwd om te ranken',
      desc:'Een website die vanaf de eerste lijn code gebouwd is om te ranken — technisch, snel en vindbaar in Google én AI-zoekmachines.' },
  ];
  renderVals() {
    const chosen = this.props.dienst || 'Website laten maken';
    const hero = this.SERVICES.find(s => s.name === chosen) || this.SERVICES[0];
    const others = this.SERVICES.filter(s => s.id !== hero.id);
    const rowTop = others.concat(others);
    const rev = others.slice().reverse();
    const rowBottom = rev.concat(rev);
    return { pillar: this.PILLAR, hero, rowTop, rowBottom };
  }
}
</script>
</body>
</html>
