# Firebase App Hosting build/runtime config.
# NEXT_PUBLIC_* values below are the public Firebase web app config - safe to
# commit (not secrets; security comes from firestore.rules + App Check, not
# from hiding this key). Anything sensitive (API keys for third-party
# services, etc.) belongs in Secret Manager via `firebase apphosting:secrets:set`
# and referenced here as `secret: NAME` instead of `value: ...`.
runConfig:
  minInstances: 0
  maxInstances: 2
  # 1 GiB in plaats van de default 512 MiB: Next SSR + sharp-beeldoptimalisatie
  # met 80 gelijktijdige verzoeken liep tegen OOM-kills aan, zichtbaar als
  # sporadische 503 "upstream connect error / connection termination".
  memoryMiB: 1024

env:
  # The actual key lives in Secret Manager, not in this file. Create/update it
  # with: firebase apphosting:secrets:set GOOGLE_PLACES_API_KEY
  - variable: GOOGLE_PLACES_API_KEY
    secret: GOOGLE_PLACES_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBsjhuCzVdqsQdORzwwL6ooROLltQjUnHQ
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: gen-lang-client-0235296023.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: gen-lang-client-0235296023
    availability:
      - BUILD
      - RUNTIME
  # Google Analytics 4 measurement id (public - it ships in the client bundle
  # regardless). Its presence enables the consent-aware loader; the Google
  # script is requested only after the visitor grants analytics consent.
  - variable: NEXT_PUBLIC_GA_ID
    value: G-5LSDJXF4FY
    availability:
      - BUILD
      - RUNTIME
  # Dedicated Storage bucket for VisualVibe uploads (this GCP project is
  # shared with other, unrelated apps, so we never use its default bucket).
  - variable: FIREBASE_STORAGE_BUCKET
    value: gen-lang-client-0235296023
    availability:
      - BUILD
      - RUNTIME
  - variable: FIRECRAWL_API_KEY
    secret: FIRECRAWL_API_KEY
    availability:
      - RUNTIME
  # 32 random bytes, base64 encoded. Create with:
  # firebase apphosting:secrets:set APP_ENCRYPTION_KEY
  # Used only to encrypt SMTP, IMAP and AI-provider credentials at rest. The
  # provider API keys themselves are managed in the backend and never declared
  # as App Hosting secrets.
  - variable: APP_ENCRYPTION_KEY
    secret: APP_ENCRYPTION_KEY
    availability:
      - RUNTIME
  # Explicit admin authorization; a valid Firebase account alone is insufficient.
  - variable: ADMIN_EMAILS
    value: jens@visualvibe.be
    availability:
      - RUNTIME
  - variable: YOUTUBE_API_KEY
    secret: YOUTUBE_API_KEY
  # SmugMug livegalerijen (fotografie-realisaties). Accountnaam = het deel voor
  # .smugmug.com. EERST de secrets aanmaken (anders faalt de deploy):
  #   firebase apphosting:secrets:set SMUGMUG_USER
  #   firebase apphosting:secrets:set SMUGMUG_API_KEY   (idem voor de andere drie)
  # en DAARNA dit blok uncommenten. Alleen SMUGMUG_USER + SMUGMUG_API_KEY zijn
  # verplicht (publieke albums); secret + tokens erbij voor volledige OAuth.
  # - variable: SMUGMUG_USER
  #   secret: SMUGMUG_USER
  #   availability:
  #     - BUILD
  #     - RUNTIME
  # - variable: SMUGMUG_API_KEY
  #   secret: SMUGMUG_API_KEY
  #   availability:
  #     - BUILD
  #     - RUNTIME
  # - variable: SMUGMUG_API_SECRET
  #   secret: SMUGMUG_API_SECRET
  #   availability:
  #     - BUILD
  #     - RUNTIME
  # - variable: SMUGMUG_ACCESS_TOKEN
  #   secret: SMUGMUG_ACCESS_TOKEN
  #   availability:
  #     - BUILD
  #     - RUNTIME
  # - variable: SMUGMUG_ACCESS_TOKEN_SECRET
  #   secret: SMUGMUG_ACCESS_TOKEN_SECRET
  #   availability:
  #     - BUILD
  #     - RUNTIME
