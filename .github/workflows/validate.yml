name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - fix/seo-aeo-geo-metadata-schema

permissions:
  contents: read

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build
