<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="design_doc_mode" content="canvas">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  a{text-decoration:none;color:inherit;}
  .svcCard:hover .arr{border-color:rgba(255,122,0,.5) !important;background:rgba(255,122,0,.12) !important;}
  .svcCard:hover .arr svg{transform:translateX(3px);}
  .arr svg{transition:transform .3s ease;}
  .svcCard:hover .wm{color:rgba(255,122,0,.11) !important;transform:translate(-6px,-6px) rotate(-4deg);}
  .wm{transition:color .4s ease,transform .5s cubic-bezier(.2,.7,.2,1);}
  @property --vvA{syntax:'<angle>';inherits:false;initial-value:0deg;}
  @keyframes vvSpinBorder{to{--vvA:360deg;}}
  .svcCard::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;background:conic-gradient(from var(--vvA),rgba(255,122,0,0) 0deg,#FF7A00 70deg,#FFC489 118deg,rgba(255,122,0,0) 205deg,rgba(255,122,0,0) 360deg);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .4s ease;pointer-events:none;z-index:3;}
  .svcCard:hover::before{opacity:1;animation:vvSpinBorder 3.4s linear infinite;}
  @media (prefers-reduced-motion: reduce){.svcCard:hover::before{animation:none;}}
</style>
</helmet>

<!-- shared icon defs -->
<svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden;"><defs>
  <g id="svc-website" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="15" rx="2"></rect><path d="M3 9h18"></path><path d="M6 6.75h.01M8.5 6.75h.01"></path><path d="M7 13h5M7 16h9"></path></g>
  <g id="svc-webshop" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="9.5" cy="20" r="1.1"></circle><circle cx="18" cy="20" r="1.1"></circle><path d="M2.5 3.5H5l2.3 11.2a1.4 1.4 0 0 0 1.4 1.1h8.6a1.4 1.4 0 0 0 1.4-1.1L21.5 7.5H6"></path></g>
  <g id="svc-onepager" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="5.5" y="2.5" width="13" height="19" rx="2"></rect><path d="M8.5 7h7M8.5 11h7M8.5 15h4.5"></path></g>
  <g id="svc-vernieuwen" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20.5 8A8.5 8.5 0 0 0 6 5L3.5 7.2"></path><path d="M3.5 3v4.2h4.2"></path><path d="M3.5 16A8.5 8.5 0 0 0 18 19l2.5-2.2"></path><path d="M20.5 21v-4.2h-4.2"></path></g>
  <g id="svc-onderhoud" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4.2 4.2 0 0 0-5.4 5.4L3.2 17.8l3 3 6.1-6.1a4.2 4.2 0 0 0 5.4-5.4l-2.6 2.6-2.6-.7-.7-2.6z"></path></g>
  <g id="svc-wordpress" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 20H21"></path><path d="M16.6 3.4a2 2 0 0 1 2.9 2.9L7 18.8l-4 1 1-4z"></path><path d="M4 4.5h5M4 8h3.5"></path></g>
  <g id="svc-seo" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path><path d="M8.6 12.5v-1.5M11 12.5V9M13.4 12.5V8"></path></g>
</defs></svg>

<div style="min-height:100%;background:#0a0a0a;color:#fff;font-family:'Manrope',sans-serif;padding:48px 56px 90px;">

  <!-- ===== PRIMARY: de echte webdesign-pagina (7 items → 2·3·2) ===== -->
  <div style="max-width:1180px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px;">
      <span style="font-family:'JetBrains Mono';font-weight:700;font-size:13px;color:#0a0a0a;background:#FF7A00;border-radius:8px;padding:5px 11px;">1a</span>
      <div style="font-size:13px;color:rgba(255,255,255,.45);">Ghost-glyph watermerk · slim raster (max 3 per rij, altijd gebalanceerd)</div>
    </div>

    <div style="font-family:'Sora';font-weight:800;font-size:32px;margin:0 0 24px;letter-spacing:-.02em;">Subdiensten</div>

    <div style="display:flex;flex-direction:column;gap:16px;">
      <sc-for list="{{ primaryRows }}" as="row" hint-placeholder-count="3">
        <div style="display:flex;gap:16px;">
          <sc-for list="{{ row.cards }}" as="s" hint-placeholder-count="3">
            <div class="svcCard" style="position:relative;overflow:hidden;flex:1 1 0;min-width:0;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);padding:22px 22px 24px;transition:transform .35s cubic-bezier(.2,.7,.2,1),border-color .35s ease,background .35s ease,box-shadow .45s ease;" style-hover="transform:translateY(-7px) scale(1.014);border-color:rgba(255,122,0,.16);background:rgba(255,122,0,.05);box-shadow:0 28px 64px -22px rgba(255,90,0,.6),0 8px 22px -14px rgba(0,0,0,.7);">
              <svg class="wm" viewBox="0 0 24 24" style="position:absolute;right:-24px;bottom:-28px;width:150px;height:150px;color:rgba(255,122,0,.055);pointer-events:none;" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><use href="#svc-{{ s.id }}"></use></svg>
              <div style="position:relative;display:flex;align-items:flex-start;gap:14px;">
                <span style="flex:none;width:46px;height:46px;border-radius:12px;background:rgba(255,122,0,.1);border:1px solid rgba(255,122,0,.2);display:flex;align-items:center;justify-content:center;">
                  <svg viewBox="0 0 24 24" width="24" height="24" style="color:#FF9A45;" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><use href="#svc-{{ s.id }}"></use></svg>
                </span>
                <div style="flex:1;min-width:0;">
                  <div style="font-family:'Sora';font-weight:700;font-size:17px;color:#fff;margin-bottom:6px;letter-spacing:-.01em;">{{ s.name }}</div>
                  <div style="font-size:13.5px;line-height:1.5;color:rgba(255,255,255,.5);">{{ s.desc }}</div>
                </div>
                <span class="arr" style="flex:none;width:33px;height:33px;border-radius:9999px;border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;transition:background .3s ease,border-color .3s ease;">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FF9A45" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
                </span>
              </div>
            </div>
          </sc-for>
        </div>
      </sc-for>
    </div>
  </div>

  <!-- divider -->
  <div style="max-width:1180px;margin:64px auto 44px;height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.1),transparent);"></div>

  <!-- ===== REFERENTIE: zo balanceert het blok per aantal ===== -->
  <div style="max-width:1180px;margin:0 auto;">
    <div style="font-family:'Sora';font-weight:700;font-size:20px;margin:0 0 6px;">Zo schaalt het blok per aantal</div>
    <p style="font-size:14px;color:rgba(255,255,255,.5);margin:0 0 32px;max-width:640px;">Standaard 3 op een rij, maar nooit een losse kaart: rijen worden gebalanceerd zodat het altijd netjes uitlijnt.</p>

    <div style="display:flex;flex-direction:column;gap:30px;">
      <sc-for list="{{ demos }}" as="d" hint-placeholder-count="5">
        <div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
            <span style="font-family:'JetBrains Mono';font-weight:700;font-size:12px;color:#FF9A45;background:rgba(255,122,0,.08);border:1px solid rgba(255,122,0,.22);border-radius:7px;padding:4px 9px;white-space:nowrap;">{{ d.label }}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px;">
            <sc-for list="{{ d.rows }}" as="row" hint-placeholder-count="2">
              <div style="display:flex;gap:12px;">
                <sc-for list="{{ row.cards }}" as="s" hint-placeholder-count="3">
                  <div class="svcCard" style="position:relative;overflow:hidden;flex:1 1 0;min-width:0;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);padding:16px 18px;display:flex;align-items:center;gap:13px;transition:transform .35s cubic-bezier(.2,.7,.2,1),border-color .35s ease,background .35s ease,box-shadow .45s ease;" style-hover="transform:translateY(-5px) scale(1.016);border-color:rgba(255,122,0,.16);background:rgba(255,122,0,.05);box-shadow:0 22px 50px -22px rgba(255,90,0,.55),0 6px 16px -12px rgba(0,0,0,.7);">
                    <svg class="wm" viewBox="0 0 24 24" style="position:absolute;right:-18px;bottom:-20px;width:96px;height:96px;color:rgba(255,122,0,.055);pointer-events:none;" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><use href="#svc-{{ s.id }}"></use></svg>
                    <span style="flex:none;width:38px;height:38px;border-radius:10px;background:rgba(255,122,0,.1);border:1px solid rgba(255,122,0,.2);display:flex;align-items:center;justify-content:center;">
                      <svg viewBox="0 0 24 24" width="20" height="20" style="color:#FF9A45;" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><use href="#svc-{{ s.id }}"></use></svg>
                    </span>
                    <div style="position:relative;font-family:'Sora';font-weight:700;font-size:14px;color:#fff;letter-spacing:-.01em;">{{ s.name }}</div>
                  </div>
                </sc-for>
              </div>
            </sc-for>
          </div>
        </div>
      </sc-for>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1400, &quot;height&quot;: 1200 } }">
class Component extends DCLogic {
  SERVICES = [
    { id:'website',    name:'Website laten maken',           desc:'Een nieuwe website, snel en gebruiksvriendelijk opgebouwd rond je doelgroep.' },
    { id:'webshop',    name:'Webshop laten maken',           desc:'Een webshop die makkelijk te beheren is en klaar is om te verkopen.' },
    { id:'onepager',   name:'Onepager laten maken',          desc:'Een strakke onepager voor wie snel online wil staan met een beperkt budget.' },
    { id:'vernieuwen', name:'Website vernieuwen',            desc:'Een verouderde website omgezet naar een snelle, actuele versie.' },
    { id:'onderhoud',  name:'Website-onderhoud',             desc:'Doorlopend onderhoud zodat je website veilig, snel en up-to-date blijft.' },
    { id:'wordpress',  name:'WordPress website laten maken', desc:'Een WordPress-website die je zelf makkelijk kan bijwerken.' },
    { id:'seo',        name:'SEO-website laten maken',       desc:'Een website die vanaf de eerste lijn code gebouwd is om te ranken.' },
  ];
  // row-size rules: max 3 per row, never leave a lonely card
  rowSizes(n) {
    const map = { 1:[1], 2:[2], 3:[3], 4:[2,2], 5:[3,2], 6:[3,3], 7:[2,3,2] };
    if (map[n]) return map[n];
    // general fallback for larger counts: rows of 3, but if 1 would be left over, end on 2,2
    const rows = []; let r = n;
    while (r > 0) {
      if (r === 4) { rows.push(2, 2); r = 0; }
      else if (r <= 3) { rows.push(r); r = 0; }
      else { rows.push(3); r -= 3; }
    }
    return rows;
  }
  buildRows(items) {
    const sizes = this.rowSizes(items.length);
    const rows = []; let idx = 0;
    for (const size of sizes) { rows.push({ cards: items.slice(idx, idx + size) }); idx += size; }
    return rows;
  }
  renderVals() {
    const all = this.SERVICES.map((s, i) => ({ ...s, num: String(i + 1).padStart(2, '0') }));
    const primaryRows = this.buildRows(all);
    const demos = [2, 3, 4, 5, 6].map(n => {
      const items = all.slice(0, n);
      return { label: n + ' items · ' + this.rowSizes(n).join('+'), rows: this.buildRows(items) };
    });
    return { primaryRows, demos };
  }
}
</script>
</body>
</html>
